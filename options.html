<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Impostazioni</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 480px;
    overflow: hidden;
  }

  .card-header {
    padding: 20px 24px 18px;
    border-bottom: 1px solid #f1f5f9;
    display: flex; align-items: center; gap: 10px;
  }
  .card-header .icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: #eef2ff;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .card-header .icon svg { width: 18px; height: 18px; }
  .card-header h1 { font-size: 16px; font-weight: 600; color: #1e293b; }

  .section {
    padding: 20px 24px;
    border-bottom: 1px solid #f1f5f9;
  }
  .section:last-child { border-bottom: none; }

  .section-title {
    font-size: 11px; font-weight: 600; color: #94a3b8;
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px;
  }

  /* Lingua */
  .lang-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .lang-option {
    border: 1.5px solid #e2e8f0;
    border-radius: 9px;
    padding: 10px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    background: #fff;
  }
  .lang-option:hover { border-color: #a5b4fc; background: #f8f9ff; }
  .lang-option.selected { border-color: #4f46e5; background: #eef2ff; }
  .lang-option .flag { font-size: 20px; display: block; margin-bottom: 4px; }
  .lang-option .lang-name { font-size: 11px; font-weight: 500; color: #475569; }
  .lang-option.selected .lang-name { color: #4f46e5; font-weight: 600; }
  .lang-option.auto .flag { font-size: 16px; line-height: 24px; color: #64748b; }

  /* Privacy info */
  .info-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 9px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    color: #475569;
  }
  .info-box + .info-box { margin-top: 10px; }

  .privacy-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .privacy-points li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: #475569;
    line-height: 1.5;
  }
  .privacy-points li .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #dcfce7; color: #16a34a;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0; margin-top: 1px;
  }

  /* About */
  .about-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .about-text { font-size: 13px; color: #475569; line-height: 1.6; }
  .version-badge {
    font-size: 11px; font-weight: 600;
    background: #f1f5f9; color: #64748b;
    border-radius: 6px; padding: 3px 8px;
    white-space: nowrap; flex-shrink: 0;
    border: 1px solid #e2e8f0;
  }

  .github-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 12px;
    color: #4f46e5; font-size: 13px; font-weight: 500;
    text-decoration: none;
    padding: 7px 12px;
    background: #eef2ff;
    border-radius: 7px;
    transition: background 0.15s;
  }
  .github-link:hover { background: #e0e7ff; }
  .github-link svg { width: 15px; height: 15px; }

  /* Save */
  .save-row {
    padding: 16px 24px;
    background: #f8fafc;
    border-top: 1px solid #f1f5f9;
    display: flex; align-items: center; justify-content: flex-end; gap: 10px;
  }
  #status-msg {
    font-size: 12px; color: #22c55e; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
  }
  #save-btn {
    background: #4f46e5; color: #fff; border: none;
    border-radius: 8px; padding: 8px 20px;
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  #save-btn:hover { background: #4338ca; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <polyline points="3 3 3 8 8 8"/>
      </svg>
    </div>
    <h1 id="opt-title">Impostazioni</h1>
  </div>

  <!-- LINGUA -->
  <div class="section">
    <div class="section-title" id="opt-lang-label">Lingua</div>
    <div class="lang-grid">
      <div class="lang-option auto" data-lang="auto">
        <span class="flag">⚙️</span>
        <span class="lang-name" id="label-auto">Automatica</span>
      </div>
      <div class="lang-option" data-lang="it">
        <span class="flag">🇮🇹</span>
        <span class="lang-name">Italiano</span>
      </div>
      <div class="lang-option" data-lang="en">
        <span class="flag">🇬🇧</span>
        <span class="lang-name">English</span>
      </div>
      <div class="lang-option" data-lang="es">
        <span class="flag">🇪🇸</span>
        <span class="lang-name">Español</span>
      </div>
      <div class="lang-option" data-lang="fr">
        <span class="flag">🇫🇷</span>
        <span class="lang-name">Français</span>
      </div>
      <div class="lang-option" data-lang="de">
        <span class="flag">🇩🇪</span>
        <span class="lang-name">Deutsch</span>
      </div>
    </div>
  </div>

  <!-- PRIVACY -->
  <div class="section">
    <div class="section-title" id="opt-privacy-label">Privacy</div>
    <ul class="privacy-points">
      <li><span class="dot">✓</span><span id="priv-1"></span></li>
      <li><span class="dot">✓</span><span id="priv-2"></span></li>
      <li><span class="dot">✓</span><span id="priv-3"></span></li>
      <li><span class="dot">✓</span><span id="priv-4"></span></li>
    </ul>
  </div>

  <!-- ABOUT -->
  <div class="section">
    <div class="section-title" id="opt-about-label">Informazioni</div>
    <div class="about-row">
      <p class="about-text" id="about-text"></p>
      <span class="version-badge">v3.0</span>
    </div>
    <a id="github-link" class="github-link" href="#" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
      <span id="github-label">Vedi su GitHub</span>
    </a>
  </div>

  <div class="save-row">
    <span id="status-msg"></span>
    <button id="save-btn">Salva</button>
  </div>
</div>

<script src="i18n.js"></script>
<script src="options.js"></script>
</body>
</html>
